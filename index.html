<!DOCTYPE html>
<html>
<head>
<title>ND Gameing</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #000000, #0f2027, #2c5364);
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 20px;
  background: rgba(0,0,0,0.8);
}

/* LOGO FIX */
.logo {
  height: 60px;   /* yahan size control hota hai */
}

/* HERO SECTION */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero img {
  width: 140px;   /* BIG LOGO CENTER */
  margin-bottom: 20px;
}

.hero h1 {
  font-size: 32px;
}

.btn {
  padding: 12px 25px;
  background: #00ffc3;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  margin-top: 20px;
}

/* LOGIN BOX */
.login-box {
  display: none;
  text-align: center;
  margin-top: 20px;
}

/* MAIN APP */
#app {
  display: none;
  padding: 20px;
}

/* GAME CARDS */
.card {
  background: #111;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
  <img src="logo.png" class="logo">
  <div>ND Gameing</div>
</nav>

<!-- LANDING -->
<div id="landing" class="hero">
  <img src="logo.png">
  <h1>🔥 Welcome to ND Gameing</h1>
  <p>Play • Earn • Enjoy</p>

  <button class="btn" onclick="showLogin()">Start Playing</button>

  <div class="login-box" id="loginBox">
    <input id="user" placeholder="Username"><br><br>
    <input id="pass" type="password" placeholder="Password"><br><br>
    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <h2>💰 Wallet: ₹<span id="balance">100</span></h2>

  <input id="amount" placeholder="Enter amount">
  <button onclick="deposit()">Deposit</button>
  <button onclick="withdraw()">Withdraw</button>

  <h2>🎮 Games</h2>

  <div class="card">🎯 Spin Wheel</div>
  <div class="card">🏏 Cricket Game</div>
  <div class="card">🚀 Rocket Crash</div>
  <div class="card">🎲 Ludo</div>
  <div class="card">🃏 Cards</div>
</div>

<script>
let balance = 100;

function showLogin() {
  document.getElementById("loginBox").style.display = "block";
}

function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u && p){
    document.getElementById("landing").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    alert("Enter details");
  }
}

function deposit() {
  let amt = Number(document.getElementById("amount").value);
  balance += amt;
  document.getElementById("balance").innerText = balance;
}

function withdraw() {
  let amt = Number(document.getElementById("amount").value);
  if(balance >= amt){
    balance -= amt;
    document.getElementById("balance").innerText = balance;
  } else {
    alert("Low balance");
  }
}
</script>

</body>
</html>
